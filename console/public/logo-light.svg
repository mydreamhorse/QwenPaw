<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" fill="none" version="1.1" width="770" height="132" viewBox="0 0 770 132">
  <!-- === 左边萝卜头图形 === -->
  <!-- 橙色圆背景 -->
  <circle cx="66" cy="66" r="50" fill="#FF8C00"/>
  <!-- 萝卜身体 -->
  <polygon points="66,42 82,115 50,115" fill="#FF6400"/>
  <!-- 萝卜叶子 -->
  <polygon points="66,42 52,18 66,32" fill="#22C822"/>
  <polygon points="66,42 66,32 80,18" fill="#00B400"/>
  <polygon points="66,42 58,22 74,22" fill="#32DC32"/>
  <!-- 眼睛 -->
  <circle cx="58" cy="72" r="6" fill="white"/>
  <circle cx="74" cy="72" r="6" fill="white"/>
  <circle cx="59" cy="73" r="3" fill="#1E1E1E"/>
  <circle cx="75" cy="73" r="3" fill="#1E1E1E"/>
  <!-- 微笑 -->
  <path d="M 58 82 Q 66 90 74 82" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- 腮红 -->
  <circle cx="51" cy="81" r="4.5" fill="rgba(255,150,150,0.7)"/>
  <circle cx="81" cy="81" r="4.5" fill="rgba(255,150,150,0.7)"/>

  <!-- === 中间文字区域 === -->
  <!-- 主标题 -->
  <text x="135" y="70" font-family="Arial, 'PingFang SC', 'Heiti SC', sans-serif" font-size="44" font-weight="bold" fill="#FF8C00">萝卜头</text>
  <!-- 副标题 -->
  <text x="137" y="98" font-family="Arial, sans-serif" font-size="16" fill="#999999" letter-spacing="2">Carrot Assistant</text>

  <!-- === 右边装饰：萝卜家族 === -->
  <!-- 小萝卜1 -->
  <g transform="translate(440, 35)">
    <circle cx="20" cy="20" r="16" fill="#FF8C00" opacity="0.25"/>
    <polygon points="20,14 24,36 16,36" fill="#FF8C00" opacity="0.6"/>
    <polygon points="20,14 17,6 20,10" fill="#22C822" opacity="0.6"/>
    <polygon points="20,14 20,10 23,6" fill="#22C822" opacity="0.6"/>
  </g>
  <!-- 小萝卜2 -->
  <g transform="translate(480, 50)">
    <circle cx="15" cy="15" r="12" fill="#FF8C00" opacity="0.2"/>
    <polygon points="15,10 18,28 12,28" fill="#FF8C00" opacity="0.5"/>
    <polygon points="15,10 13,4 15,7" fill="#22C822" opacity="0.5"/>
    <polygon points="15,10 15,7 17,4" fill="#22C822" opacity="0.5"/>
  </g>
  <!-- 小萝卜3 -->
  <g transform="translate(515, 38)">
    <circle cx="18" cy="18" r="14" fill="#FF8C00" opacity="0.22"/>
    <polygon points="18,12 22,34 14,34" fill="#FF8C00" opacity="0.55"/>
    <polygon points="18,12 15,5 18,9" fill="#22C822" opacity="0.55"/>
    <polygon points="18,12 18,9 21,5" fill="#22C822" opacity="0.55"/>
  </g>

  <!-- 装饰线 -->
  <line x1="560" y1="20" x2="560" y2="112" stroke="#FF8C00" stroke-width="1.5" opacity="0.3"/>
  <line x1="565" y1="30" x2="565" y2="102" stroke="#FF8C00" stroke-width="1" opacity="0.2"/>

  <!-- 右边文字：AI Assistant -->
  <text x="590" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#FF8C00" opacity="0.8">AI</text>
  <text x="590" y="80" font-family="Arial, 'PingFang SC', 'Heiti SC', sans-serif" font-size="14" fill="#999999">智能助理</text>

  <!-- 小装饰：星 -->
  <text x="580" y="25" font-size="14" opacity="0.4">✨</text>
  <text x="540" y="108" font-size="12" opacity="0.35">🥕</text>
  <text x="620" y="108" font-size="12" opacity="0.35">💡</text>
</svg>
