<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" fill="none" version="1.1" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Rounded rectangle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="192" fill="#FCFAF8"/>

  <!-- Orange circle background -->
  <circle cx="512" cy="512" r="340" fill="#FF8C00"/>

  <!-- Carrot body (large, centered) -->
  <polygon points="512,320 630,860 394,860" fill="#FF6400"/>

  <!-- Carrot leaves -->
  <polygon points="512,320 450,200 512,280" fill="#22C822"/>
  <polygon points="512,320 574,200 512,280" fill="#00B400"/>
  <polygon points="512,320 470,210 554,210" fill="#32DC32"/>

  <!-- Eyes (white with dark pupils) -->
  <circle cx="472" cy="600" r="32" fill="white"/>
  <circle cx="552" cy="600" r="32" fill="white"/>
  <circle cx="480" cy="610" r="14" fill="#1E1E1E"/>
  <circle cx="560" cy="610" r="14" fill="#1E1E1E"/>

  <!-- Smile -->
  <path d="M 472 660 Q 512 710 552 660" stroke="white" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- Cheeks -->
  <circle cx="420" cy="655" r="20" fill="rgba(255,150,150,0.7)"/>
  <circle cx="604" cy="655" r="20" fill="rgba(255,150,150,0.7)"/>

  <!-- Subtle shine on carrot -->
  <polygon points="512,340 480,700 495,700" fill="rgba(255,200,100,0.3)"/>
</svg>
